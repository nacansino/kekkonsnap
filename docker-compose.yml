services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - app-data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - DATABASE_URL=/app/data/kekkonsnap.db
      - UPLOAD_DIR=/app/data/uploads
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me}
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  app-data:
  caddy-data:
  caddy-config:
